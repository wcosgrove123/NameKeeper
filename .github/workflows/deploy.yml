name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./namekeeper-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: namekeeper-app/package-lock.json

      - run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_PASSWORD_HASH: ${{ secrets.SITE_PASSWORD_HASH }}
          NEXT_PUBLIC_READ_ONLY: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: namekeeper-app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
